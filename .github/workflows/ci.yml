name: CI

# CI multi-host (S13/F6-A2): guard + testes + smoke + conformance por host.
# Falha bloqueia merge/release. Roda em push e PR.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  multihost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build (gera bundles + catálogos + roda check-consistency no fim)
        shell: bash
        run: build/build-plugins.sh

      - name: Catálogos from-source sincronizados (sem diff nem untracked)
        shell: bash
        run: |
          set -euo pipefail
          # --porcelain pega modificado E untracked (dotfiles novos como hosts/pi/.mcp.json
          # e hosts/pi/.pi/ não apareceriam em `git diff`, só aqui).
          dirty="$(git status --porcelain -- plugins/ hosts/)"
          if [[ -n "$dirty" ]]; then
            echo "Catálogos from-source desatualizados/untracked — rode build/build-plugins.sh e commite plugins/ e hosts/." >&2
            echo "$dirty" >&2
            exit 1
          fi

      - name: Testes unitários do núcleo MCP
        shell: bash
        run: node --test packages/mcp-server/server.test.js

      - name: Smoke por host
        shell: bash
        run: node build/smoke-hosts.mjs

      - name: Matriz de conformance multi-host
        shell: bash
        run: node build/conformance-matrix.mjs

      - name: Checksums conferem
        shell: bash
        run: (cd dist && shasum -a 256 -c SHA256SUMS)

  # Runtime MCP em Windows/macOS (fecha T07/T08 da auditoria de maturidade):
  # boot + detecção + capabilities + preflight + FSM do validador rodam só por
  # Node puro (sem build bash/shasum, que não são portáveis), sobre os catálogos
  # já commitados. O build completo + checksums seguem no job `multihost` (ubuntu).
  cross-os:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Testes unitários do núcleo MCP
        run: node --test packages/mcp-server/server.test.js

      - name: Smoke por host
        run: node build/smoke-hosts.mjs

      - name: Matriz de conformance multi-host
        run: node build/conformance-matrix.mjs
