name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          test "$version" = "$tag"

      - name: Build plugins
        shell: bash
        run: build/build-plugins.sh

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          awk -v version="v${version}" '
            $0 ~ "^## " version " - " { capture=1 }
            capture && /^## / && $0 !~ "^## " version " - " { exit }
            capture { print }
          ' CHANGELOG.md > dist/RELEASE_NOTES.md
          test -s dist/RELEASE_NOTES.md

      - name: Verify artifacts
        shell: bash
        run: |
          set -euo pipefail
          for host in claude codex opencode pi; do
            test -f "dist/atlas-workflow-${host}.plugin"
            unzip -t "dist/atlas-workflow-${host}.plugin" >/dev/null
          done
          test -f dist/SHA256SUMS
          (cd dist && shasum -a 256 -c SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/atlas-workflow-claude.plugin
            dist/atlas-workflow-codex.plugin
            dist/atlas-workflow-opencode.plugin
            dist/atlas-workflow-pi.plugin
            dist/SHA256SUMS
