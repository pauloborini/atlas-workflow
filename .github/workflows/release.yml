name: Release

# Dispara em dois caminhos, ambos resultando em publish npm + GitHub Release:
#   1. Full auto: push na `main` (caminho primário — o job `decide` publica
#      quando a VERSION atual ainda não tem tag `vX.Y.Z`; pushes sem bump têm a
#      tag já existente e são pulados, então rodar em todo push é seguro e barato).
#   2. Manual/override: push de tag `vX.Y.Z` (re-release, hotfix fora da main).
# A tag `vX.Y.Z` é criada pela própria action de release no caminho 1 (não exige
# PAT). Tag criada via GITHUB_TOKEN não re-dispara o workflow (sem loop); mesmo
# que disparasse, o job `decide` detecta a tag existente e pula.
# Sem filtro `paths` de propósito: combinar `paths` com `tags` no mesmo push tem
# semântica ambígua no GitHub Actions e pode engolir o push de tag manual.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # habilita --provenance no npm publish (linka release <-> pacote)

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ctx.outputs.version }}
      release: ${{ steps.ctx.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisa do histórico de tags para detectar release já feito

      - name: Determinar versão e se deve publicar
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Caminho 2: tag empurrada manualmente.
            version="${GITHUB_REF_NAME#v}"
            release=true
          else
            # Caminho 1: push na main com VERSION alterado.
            version="$(tr -d '[:space:]' < VERSION)"
            if git rev-parse "v${version}" >/dev/null 2>&1; then
              echo "::notice::v${version} já existe como tag; já publicado. Pulando."
              release=false
            else
              release=true
            fi
          fi
          # Guard de sincronia: package.json é o que o npm publica; tem que casar
          # com VERSION/tag antes de qualquer publicação.
          pkg="$(node -p "require('./package.json').version")"
          if [[ "${version}" != "${pkg}" ]]; then
            echo "::error::VERSION/tag (${version}) difere de package.json (${pkg}). Rode build/bump-version.mjs." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release=${release}" >> "$GITHUB_OUTPUT"

  publish:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.decide.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Invoca via `bash` explícito (não depende de bit +x do script). O
      # actions/checkout@v4 em Linux respeita o file mode do index do git —
      # se o +x não for commitado, o runner não tem permissão de executar o
      # .sh e o shell retorna exit 126 antes de qualquer check rodar.
      - name: Build plugins (roda check-consistency no fim)
        shell: bash
        run: bash build/build-plugins.sh

      # Guards de qualidade antes de publicar (full-auto: main quebrada nunca
      # publica). Espelham o job multihost do ci.yml.
      - name: Testes unitários do núcleo MCP
        shell: bash
        run: node --test packages/mcp-server/server.test.js

      - name: Smoke por host
        shell: bash
        run: node build/smoke-hosts.mjs

      - name: Matriz de conformance multi-host
        shell: bash
        run: node build/conformance-matrix.mjs

      - name: Extrair notas de release do CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          awk -v plain="${VERSION}" -v tagged="v${VERSION}" '
            $0 ~ "^## (" plain "|" tagged ") - " { capture=1 }
            capture && /^## / && $0 !~ "^## (" plain "|" tagged ") - " { exit }
            capture { print }
          ' CHANGELOG.md > dist/RELEASE_NOTES.md
          if [ ! -s dist/RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md não tem entrada para ${VERSION}. Adicione antes de bumpar VERSION na main." >&2
            exit 1
          fi

      - name: Verificar artefatos
        shell: bash
        run: |
          set -euo pipefail
          for host in claude codex opencode pi zcode; do
            test -f "dist/talos-${host}.plugin"
            unzip -t "dist/talos-${host}.plugin" >/dev/null
          done
          test -f dist/SHA256SUMS
          (cd dist && shasum -a 256 -c SHA256SUMS)

      - name: Publicar no npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$(node -e "const p=require('./package.json'); process.stdout.write(\`name=\${JSON.stringify(p.name)}\nversion=\${JSON.stringify(p.version)}\nprivate=\${JSON.stringify(!!p.private)}\n\`);")"
          if [ "$private" = "true" ]; then
            echo "::error::package.json tem private:true; recusando publicar." >&2
            exit 1
          fi
          if [ "$version" != "$VERSION" ]; then
            echo "::error::package.json version ($version) difere da versão a publicar ($VERSION)." >&2
            exit 1
          fi
          # Idempotência: versão já publicada (re-run após falha parcial) => pula.
          existing="$(npm view "${name}@${version}" version 2>/dev/null || true)"
          if [ "$existing" = "$version" ]; then
            echo "::notice::${name}@${version} já publicado; pulando npm publish."
          else
            npm publish --provenance --access public
          fi

      - name: Publicar GitHub Release (cria a tag se ausente)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/talos-claude.plugin
            dist/talos-codex.plugin
            dist/talos-opencode.plugin
            dist/talos-pi.plugin
            dist/talos-zcode.plugin
            dist/SHA256SUMS
